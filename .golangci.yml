version: "2"
run:
  go: "1.24"
  modules-download-mode: readonly
linters:
  default: standard
  enable:
    - godot
    - whitespace
    - unconvert
    - containedctx
    - decorder
    - dupl
    - copyloopvar
    - nolintlint
    - nilerr
    - exhaustive
    - goconst
    - errchkjson
    - errname
    - bidichk
  settings:
    exhaustive:
      default-signifies-exhaustive: true
exclusions:
  generated: lax
  paths:
    - third_party$
    - builtin$
    - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 3
